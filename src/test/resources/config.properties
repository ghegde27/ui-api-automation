# =========================================================
# PLATFORM
# =========================================================
# Supported:
# web
# android
# ios
# =========================================================
platform=web

# =========================================================
# EXECUTION TYPE
# =========================================================
# local
# remote
# grid
# =========================================================
execution.type=local

# =========================================================
# BROWSER CONFIGURATION
# =========================================================
# Supported Browsers:
# chrome
# firefox
# edge
# safari
# =========================================================
browser=chrome

# =========================================================
# HEADLESS EXECUTION
# =========================================================
headless=false

# =========================================================
# BROWSER WINDOW
# =========================================================
browser.maximize=true

# =========================================================
# TIMEOUTS
# =========================================================
implicit.wait=10
explicit.wait=20
page.load.timeout=60
script.timeout=30

# =========================================================
# SELENIUM GRID / REMOTE
# =========================================================
selenium.grid.url=http://localhost:4444/wd/hub

# =========================================================
# BASE URL
# =========================================================
base.url=https://practice.expandtesting.com/

# =========================================================
# DOWNLOAD SETTINGS
# =========================================================
download.path=downloads/

# =========================================================
# SCREENSHOT SETTINGS
# =========================================================
screenshot.on.failure=true
screenshot.path=test-output/screenshots/

# =========================================================
# VIDEO RECORDING
# =========================================================
video.recording=false

# =========================================================
# RETRY CONFIGURATION
# =========================================================
retry.count=2

# =========================================================
# PARALLEL EXECUTION
# =========================================================
parallel.execution=true
thread.count=5

# =========================================================
# LOGGING
# =========================================================
log.level=INFO

# =========================================================
# APPIUM CONFIGURATION
# =========================================================
appium.mode=remote

# Remote Appium URL
appium.server.url=http://127.0.0.1:4723

# =========================================================
# ANDROID APP DETAILS
# =========================================================
# appium.app=/apps/moneycontrol.apk

appium.appPackage=com.divum.MoneyControl

appium.appActivity=com.moneycontrol.handheld.SplashActivity

# =========================================================
# APPIUM STABILITY
# =========================================================
appium.newCommandTimeout=300

appium.autoGrantPermissions=true

appium.skipDeviceInit=true

appium.appWaitActivity=*

appium.noReset=true

# =========================================================
# MOBILE PLATFORM VERSION
# =========================================================
platform.version=14

# =========================================================
# DEVICE CONFIG
# =========================================================
device.name=Android Device

# =========================================================
# AUTOMATION ENGINE
# =========================================================
automation.name=UiAutomator2

# =========================================================
# IOS CONFIGURATION
# =========================================================
ios.bundleId=

ios.platformVersion=

ios.deviceName=iPhone 15

# =========================================================
# REPORTING
# =========================================================
allure.results.directory=allure-results

extent.report.path=test-output/extent-report/

# =========================================================
# ENVIRONMENT
# =========================================================
environment=qa

# =========================================================
# API CONFIGURATION
# =========================================================
api.base.url=http://gateway.local:8081
api.connection.timeout.ms=10000
api.socket.timeout.ms=30000
api.default.content.type=application/json
api.logging.enabled=true
api.auth.bearer.token=
api.auth.api.key.header=
api.auth.api.key.value=

# =========================================================
# DATABASE CONFIGURATION
# =========================================================
db.url=

db.username=

db.password=

db.driver.class=
db.connection.timeout.ms=10000

# =========================================================
# REDIS CONFIGURATION
# =========================================================
redis.host=localhost
redis.port=6379
redis.password=
redis.database=0
redis.connection.timeout.ms=10000
redis.socket.timeout.ms=10000
redis.max.total=8
redis.max.idle=8
redis.min.idle=0


network.capture.enabled=false
